name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, gd
          tools: composer:v2
          coverage: xdebug

      - name: Install Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        # Retry: the laravel:fonts plugin fetches remote fonts at build time,
        # which occasionally fails with a transient network error (ECONNRESET).
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}..."
            if npm run build; then
              exit 0
            fi
            echo "Build attempt ${attempt} failed, retrying in 5s..." >&2
            sleep 5
          done
          echo "Build failed after 3 attempts" >&2
          exit 1

      - name: Run Type Analysis
        run: composer types:check

      - name: Run Tests
        run: php artisan test --testsuite=Unit,Feature

  coverage:
    runs-on: ubuntu-latest
    env:
      # Minimum required line coverage; CI fails below this. Current level is
      # ~95% (see the coverage badge / job summary), leaving some headroom.
      COVERAGE_MIN: '90'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, gd
          tools: composer:v2
          coverage: xdebug

      - name: Install Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        # Retry: the laravel:fonts plugin fetches remote fonts at build time,
        # which occasionally fails with a transient network error (ECONNRESET).
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}..."
            if npm run build; then
              exit 0
            fi
            echo "Build attempt ${attempt} failed, retrying in 5s..." >&2
            sleep 5
          done
          echo "Build failed after 3 attempts" >&2
          exit 1

      - name: Run Tests With Coverage
        run: php artisan test --testsuite=Unit,Feature --coverage --coverage-clover=coverage/clover.xml --min=${{ env.COVERAGE_MIN }}

      - name: Extract Coverage Percentage
        id: coverage
        if: ${{ !cancelled() }}
        run: |
          pct=$(php -r '$m = simplexml_load_file("coverage/clover.xml")->project->metrics; $s = (float) $m["statements"]; echo $s > 0 ? round((float) $m["coveredstatements"] / $s * 100, 2) : 0;')
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### Coverage: ${pct}%" >> "$GITHUB_STEP_SUMMARY"

      - name: Update Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 89b10cbc79557b748b8f50d2955dd9f6
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: '50'
          maxColorRange: '90'
